name: "Sunsynk Optimizer"
version: "1.0.0"
slug: "sunsynk_optimizer"
description: "Sets Sunsynk battery charge threshold based on Octopus Agile prices and solar forecasts"
url: "https://github.com/your-repo/sunsynk"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: application
boot: auto
map: []
options:
  sunsynk_username: ""
  sunsynk_password: ""
  ha_url: "http://homeassistant.local:8123"
  ha_token: ""
  ha_battery_soc_entity: "sensor.solarsynkv3_2310140043_battery_bms_soc"
  ha_battery_voltage_entity: "sensor.solarsynkv3_2310140043_battery_voltage"
  ha_battery_max_current_entity: "sensor.solarsynkv3_2310140043_batterymaxcurrentcharge"
  ha_battery_capacity_ah_entity: "sensor.solarsynkv3_2310140043_battery_capacity"
  ha_load_daily_entity: "sensor.solarsynkv3_2310140043_load_daily_used"
  consumption_average_days: 7
  solcast_api_key: ""
  solcast_sites: ""
  octopus_product: "AGILE-24-04-03"
  octopus_tariff: "E-1R-AGILE-24-04-03-G"
  battery_capacity_wh: 10000
  battery_fill_rate_wh: 2000
  avg_consumption_wh: 500
  peak_hour: 16
  min_charge_floor_pence: 10
  forecast_confidence_factor: 0.3
  forecast_fetch_times: "06:00,12:00"
  ha_heat_pump_entity: "sensor.main_heat_pump_total_electricity_consumption_kwh"
  ha_outdoor_temp_entity: "sensor.main_heat_pump_outdoor_temperature"
  standard_tariff_pence: 24
  ha_ev_charger_entity: "sensor.go2_andi_charge_power"
schema:
  sunsynk_username: str
  sunsynk_password: password
  ha_url: str
  ha_token: password
  ha_battery_soc_entity: str
  ha_battery_voltage_entity: str
  ha_battery_max_current_entity: str
  ha_battery_capacity_ah_entity: str
  ha_load_daily_entity: str
  consumption_average_days: int
  solcast_api_key: password
  solcast_sites: str
  octopus_product: str
  octopus_tariff: str
  battery_capacity_wh: int
  battery_fill_rate_wh: int
  avg_consumption_wh: int
  peak_hour: int
  min_charge_floor_pence: int
  forecast_confidence_factor: float
  forecast_fetch_times: str
  ha_heat_pump_entity: str
  ha_outdoor_temp_entity: str
  standard_tariff_pence: float
  ha_ev_charger_entity: str
